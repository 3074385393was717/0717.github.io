<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Safety System</title>
    <style>
        /* 保持你原本的高级渐变背景和样式 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%); color: #fff; min-height: 100vh; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding-bottom: 20px; border-bottom: 1px solid #e94560; margin-bottom: 20px; }
        .panel { background: rgba(255,255,255,0.05); border-radius: 18px; padding: 22px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px; }
        .tab-btn { padding: 8px 16px; border: none; border-radius: 20px; background: rgba(255,255,255,0.1); color: #aaa; cursor: pointer; transition: 0.3s; margin: 5px; }
        .tab-btn.active { background: linear-gradient(135deg, #e94560, #ff6b81); color: #fff; }
        .sub-panel { display: none; }
        .sub-panel.active { display: block; padding: 20px 0; }
        h2 { color: #e94560; margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="top-bar">
            <div class="logo">🦺 <span id="app-title">智能安全监控与考勤系统</span></div>
            <div class="lang-switcher">
                <button class="lang-btn" onclick="switchLang('zh')">中文</button>
                <button class="lang-btn" onclick="switchLang('en')">English</button>
                <button class="lang-btn" onclick="switchLang('ko')">한국어</button>
            </div>
        </div>

        <div class="panel">
            <h2><span data-i18n="monitor_center">监测中心</span></h2>
            
            <div class="tab-container">
                <button class="tab-btn active" onclick="switchSubTab('image', this)" data-i18n="image_detect">图片检测</button>
                <button class="tab-btn" onclick="switchSubTab('camera', this)" data-i18n="video_detect">实时摄像头</button>
            </div>

            <div id="sub-image" class="sub-panel active">
                <div class="upload-area" style="border: 3px dashed rgba(233, 69, 96, 0.4); padding: 40px; text-align: center; border-radius: 15px;">
                    <p data-i18n="upload_text">拖拽图片到此处，或点击上传</p>
                </div>
            </div>

            <div id="sub-camera" class="sub-panel">
                <div class="camera-container" style="height: 300px; background: #000; border-radius: 15px; display: flex; align-items: center; justify-content: center;">
                    <p data-i18n="start_camera">点击开启摄像头开始实时检测</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const translations = {
            'zh': { 'monitor_center': '监测中心', 'image_detect': '图片检测', 'video_detect': '实时摄像头', 'upload_text': '拖拽图片到此处，或点击上传', 'start_camera': '点击开启摄像头开始实时检测' },
            'en': { 'monitor_center': 'Monitoring Center', 'image_detect': 'Image Detection', 'video_detect': 'Live Camera', 'upload_text': 'Drag and drop image here', 'start_camera': 'Click to start camera detection' },
            'ko': { 'monitor_center': '모니터링 센터', 'image_detect': '이미지 감지', 'video_detect': '실시간 카메라', 'upload_text': '이미지를 드래그하여 업로드', 'start_camera': '카메라 감지 시작' }
        };

        function switchLang(lang) {
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[lang][key]) el.textContent = translations[lang][key];
            });
        }

        function switchSubTab(type, btn) {
            document.querySelectorAll('.sub-panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('sub-' + type).classList.add('active');
            btn.classList.add('active');
        }
    </script>
</body>
</html>
