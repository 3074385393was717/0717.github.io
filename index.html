<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Safety System</title>
    <style>
        /* (此处保留您原有的全部 CSS 代码) */
        .panel-full { grid-column: 1 / -1; }
    </style>
</head>
<body>
    <div class="container">
        <div class="top-bar">
            <div class="logo">
                <span>🦺</span>
                <span id="app-title">智能安全监控与考勤系统</span>
            </div>
            <div class="lang-switcher">
                <button class="lang-btn active" data-lang="zh" onclick="switchLang('zh')">中文</button>
                <button class="lang-btn" data-lang="en" onclick="switchLang('en')">English</button>
                <button class="lang-btn" data-lang="ko" onclick="switchLang('ko')">한국어</button>
            </div>
        </div>

        <div class="tab-container">
            <button class="tab-btn active" onclick="switchTab('detect')" data-i18n="detection_center">检测中心</button>
            <button class="tab-btn" onclick="switchTab('zone')" data-i18n="danger_zone">危险区域</button>
            <button class="tab-btn" onclick="switchTab('face')" data-i18n="face_manage">人脸库</button>
            <button class="tab-btn" onclick="switchTab('attendance')" data-i18n="attendance">考勤</button>
        </div>

        <div id="tab-detect" class="tab-content active">
            <div class="main-grid">
                <div class="panel">
                    <h2><span>📷</span> <span data-i18n="image_detect">图片检测</span></h2>
                    <div class="upload-area" id="uploadArea">...</div>
                    </div>
                <div class="panel">
                    <h2><span>🎥</span> <span data-i18n="video_detect">实时监控</span></h2>
                    <div class="camera-container" id="cameraContainer">...</div>
                    </div>
            </div>
        </div>
        
        </div>

    <script>
        // ============ 增强后的多语言切换 ============
        async function switchLang(lang) {
            currentLang = lang;
            document.documentElement.lang = lang; // 设置 HTML 标签语言
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.lang === lang);
            });
            await loadLang(lang);
            applyLang();
            
            // 切换语言时自动刷新当前视图的动态内容
            refreshCurrentView();
        }

        function refreshCurrentView() {
            if (currentTab === 'attendance') loadAttendanceToday();
            if (currentTab === 'zone') renderZoneList();
            if (currentTab === 'face') loadFaces();
            updateStatsDisplay();
        }

        function applyLang() {
            // 更新文本
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.dataset.i18n;
                if (langData[key]) el.textContent = langData[key];
            });
            // 更新占位符
            document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
                const key = el.dataset.i18nPlaceholder;
                if (langData[key]) el.placeholder = langData[key];
            });
            // 更新标题
            document.getElementById('app-title').textContent = langData['title'] || 'Smart Safety System';
        }

        // ============ Tab 切换优化 ============
        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById('tab-' + tab).classList.add('active');
            
            // 对应按钮高亮
            event.target.classList.add('active');
            refreshCurrentView();
        }
        
        // ... 其他原有逻辑保持不变 ...
    </script>
</body>
</html>
