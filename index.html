<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Safety System</title>
    <style>
        /* CSS 保持原样，增加子Tab样式 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%); color: #fff; min-height: 100vh; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding-bottom: 20px; border-bottom: 1px solid #444; margin-bottom: 20px; }
        .panel { background: rgba(255,255,255,0.05); border-radius: 18px; padding: 22px; border: 1px solid rgba(255,255,255,0.1); }
        .tab-btn { padding: 8px 16px; border: none; border-radius: 20px; background: rgba(255,255,255,0.1); color: #aaa; cursor: pointer; transition: 0.3s; margin: 5px; }
        .tab-btn.active { background: #e94560; color: #fff; }
        .sub-panel { display: none; margin-top: 20px; }
        .sub-panel.active { display: block; }
        .btn { background: #e94560; color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <div class="top-bar">
            <div class="logo">🦺 <span id="app-title">智能安全监控与考勤系统</span></div>
            <div class="lang-switcher">
                <button class="lang-btn active" onclick="switchLang('zh')">中文</button>
                <button class="lang-btn" onclick="switchLang('en')">English</button>
                <button class="lang-btn" onclick="switchLang('ko')">한국어</button>
            </div>
        </div>

        <div class="panel">
            <h2><span>📷</span> <span data-i18n="monitor_center">监测中心</span></h2>
            <div style="margin-top: 15px;">
                <button class="tab-btn active" onclick="switchSubTab('image')" data-i18n="image_detect">图片检测</button>
                <button class="tab-btn" onclick="switchSubTab('camera')" data-i18n="video_detect">实时摄像头</button>
            </div>

            <div id="sub-image" class="sub-panel active">
                <div class="upload-area" id="uploadArea" style="border: 2px dashed #e94560; padding: 40px; text-align: center; cursor: pointer;">
                    <p data-i18n="upload_text">拖拽图片到此处或点击上传</p>
                </div>
            </div>

            <div id="sub-camera" class="sub-panel">
                <div class="camera-container" style="height: 300px; background: #000; display: flex; align-items: center; justify-content: center;">
                    <p data-i18n="start_camera">摄像头画面</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 简单的多语言数据
        const translations = {
            'zh': { 'monitor_center': '监测中心', 'image_detect': '图片检测', 'video_detect': '实时摄像头', 'upload_text': '拖拽图片到此处或点击上传', 'start_camera': '点击开启摄像头', 'app_title': '智能安全监控与考勤系统' },
            'en': { 'monitor_center': 'Monitor Center', 'image_detect': 'Image Detection', 'video_detect': 'Live Camera', 'upload_text': 'Drag and drop or click to upload', 'start_camera': 'Click to start camera', 'app_title': 'Smart Safety System' },
            'ko': { 'monitor_center': '모니터링 센터', 'image_detect': '이미지 감지', 'video_detect': '실시간 카메라', 'upload_text': '이미지를 드래그하거나 클릭하여 업로드', 'start_camera': '카메라 시작', 'app_title': '스마트 안전 시스템' }
        };

        function switchLang(lang) {
            document.documentElement.lang = lang;
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.textContent.toLowerCase().includes(lang === 'zh' ? '中文' : lang === 'en' ? 'Eng' : '한국')));
            
            // 更新所有带有 data-i18n 的元素
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[lang][key]) el.textContent = translations[lang][key];
            });
            document.getElementById('app-title').textContent = translations[lang]['app_title'];
        }

        function switchSubTab(type) {
            document.querySelectorAll('.sub-panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('sub-' + type).classList.add('active');
            event.target.classList.add('active');
        }
    </script>
</body>
</html>
