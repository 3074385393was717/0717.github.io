<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🦺 工人安全帽智能检测系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 2px solid #e94560;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 2.5em;
            color: #e94560;
            text-shadow: 0 0 20px rgba(233, 69, 96, 0.5);
        }

        header p {
            color: #a0a0a0;
            margin-top: 10px;
            font-size: 1.1em;
        }

        /* 统计面板 */
        .stats-panel {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .stat-card.compliant {
            border-left: 4px solid #00d9ff;
        }

        .stat-card.violation {
            border-left: 4px solid #ff4757;
        }

        .stat-card.total {
            border-left: 4px solid #ffa502;
        }

        .stat-card.rate {
            border-left: 4px solid #2ed573;
        }

        .stat-value {
            font-size: 2.5em;
            font-weight: bold;
            margin: 10px 0;
        }

        .stat-card.compliant .stat-value { color: #00d9ff; }
        .stat-card.violation .stat-value { color: #ff4757; }
        .stat-card.total .stat-value { color: #ffa502; }
        .stat-card.rate .stat-value { color: #2ed573; }

        .stat-label {
            color: #a0a0a0;
            font-size: 0.9em;
        }

        /* 主内容区 */
        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }

        @media (max-width: 900px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }

        .panel {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .panel h2 {
            color: #e94560;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* 上传区域 */
        .upload-area {
            border: 3px dashed rgba(233, 69, 96, 0.5);
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .upload-area:hover {
            border-color: #e94560;
            background: rgba(233, 69, 96, 0.05);
        }

        .upload-area.dragover {
            background: rgba(233, 69, 96, 0.1);
            border-color: #e94560;
        }

        .upload-icon {
            font-size: 3em;
            margin-bottom: 15px;
        }

        .upload-text {
            color: #a0a0a0;
            margin-bottom: 15px;
        }

        .file-input {
            display: none;
        }

        .btn {
            background: linear-gradient(135deg, #e94560, #ff6b81);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s;
            margin: 5px;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(233, 69, 96, 0.4);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #00d9ff, #0097e6);
        }

        .btn-danger {
            background: linear-gradient(135deg, #ff4757, #ff6348);
        }

        /* 图片预览 */
        .preview-container {
            margin-top: 20px;
            text-align: center;
            display: none;
        }

        .preview-container.active {
            display: block;
        }

        .preview-image {
            max-width: 100%;
            max-height: 400px;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
        }

        /* 检测结果 */
        .result-panel {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.2);
            display: none;
        }

        .result-panel.active {
            display: block;
        }

        .detection-item {
            display: flex;
            justify-content: space-between;
            padding: 8px;
            margin: 5px 0;
            border-radius: 5px;
            background: rgba(255, 255, 255, 0.05);
        }

        .detection-item.compliant {
            border-left: 3px solid #00d9ff;
        }

        .detection-item.violation {
            border-left: 3px solid #ff4757;
        }

        /* 摄像头区域 */
        .camera-container {
            position: relative;
            width: 100%;
            height: 400px;
            background: #000;
            border-radius: 15px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .camera-feed {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .camera-placeholder {
            text-align: center;
            color: #666;
        }

        .camera-controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        /* 历史记录图表 */
        .chart-container {
            margin-top: 20px;
            height: 250px;
            position: relative;
        }

        .history-list {
            max-height: 200px;
            overflow-y: auto;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            padding: 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 0.9em;
        }

        /* 加载动画 */
        .loader {
            display: none;
            width: 50px;
            height: 50px;
            border: 3px solid rgba(233, 69, 96, 0.3);
            border-radius: 50%;
            border-top-color: #e94560;
            animation: spin 1s ease-in-out infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 警告提示 */
        .alert {
            padding: 15px;
            border-radius: 10px;
            margin: 10px 0;
            display: none;
        }

        .alert.show {
            display: block;
        }

        .alert-success {
            background: rgba(46, 213, 115, 0.2);
            border: 1px solid #2ed573;
            color: #2ed573;
        }

        .alert-error {
            background: rgba(255, 71, 87, 0.2);
            border: 1px solid #ff4757;
            color: #ff4757;
        }

        /* 图例 */
        .legend {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9em;
        }

        .legend-color {
            width: 20px;
            height: 20px;
            border-radius: 4px;
        }

        footer {
            text-align: center;
            padding: 20px;
            color: #666;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🦺 工人安全帽智能检测系统</h1>
            <p>基于 YOLOv8 深度学习模型的实时安全帽佩戴检测</p>
        </header>

        <!-- 统计面板 -->
        <div class="stats-panel">
            <div class="stat-card total">
                <div class="stat-label">总检测次数</div>
                <div class="stat-value" id="stat-total">0</div>
            </div>
            <div class="stat-card compliant">
                <div class="stat-label">合规 (佩戴安全帽)</div>
                <div class="stat-value" id="stat-compliant">0</div>
            </div>
            <div class="stat-card violation">
                <div class="stat-label">违规 (未佩戴安全帽)</div>
                <div class="stat-value" id="stat-violation">0</div>
            </div>
            <div class="stat-card rate">
                <div class="stat-label">合规率</div>
                <div class="stat-value" id="stat-rate">0%</div>
            </div>
        </div>

        <!-- 主内容 -->
        <div class="main-content">
            <!-- 图片检测面板 -->
            <div class="panel">
                <h2>📷 图片检测</h2>
                
                <div class="upload-area" id="uploadArea">
                    <div class="upload-icon">📤</div>
                    <div class="upload-text">
                        拖拽图片到此处，或点击上传<br>
                        <small>支持 JPG, PNG, BMP 格式</small>
                    </div>
                    <button class="btn">选择图片</button>
                    <input type="file" class="file-input" id="fileInput" accept="image/*">
                </div>

                <div class="loader" id="loader"></div>

                <div class="preview-container" id="previewContainer">
                    <img class="preview-image" id="previewImage" src="" alt="检测结果">
                </div>

                <div class="result-panel" id="resultPanel">
                    <h3 style="color: #e94560; margin-bottom: 10px;">📊 检测结果</h3>
                    <div id="detectionList"></div>
                    <div class="legend">
                        <div class="legend-item">
                            <div class="legend-color" style="background: #00d9ff;"></div>
                            <span>已佩戴安全帽</span>
                        </div>
                        <div class="legend-item">
                            <div class="legend-color" style="background: #ff4757;"></div>
                            <span>未佩戴安全帽</span>
                        </div>
                    </div>
                </div>

                <div class="alert alert-success" id="alertSuccess"></div>
                <div class="alert alert-error" id="alertError"></div>
            </div>

            <!-- 实时摄像头面板 -->
            <div class="panel">
                <h2>🎥 实时摄像头检测</h2>
                
                <div class="camera-container" id="cameraContainer">
                    <div class="camera-placeholder" id="cameraPlaceholder">
                        <div style="font-size: 3em;">📹</div>
                        <p>点击"开启摄像头"开始实时检测</p>
                    </div>
                    <img class="camera-feed" id="cameraFeed" style="display: none;">
                </div>

                <div class="camera-controls">
                    <button class="btn btn-secondary" id="btnStartCamera" onclick="startCamera()">
                        ▶️ 开启摄像头
                    </button>
                    <button class="btn btn-danger" id="btnStopCamera" onclick="stopCamera()" style="display: none;">
                        ⏹️ 停止摄像头
                    </button>
                    <button class="btn" onclick="resetStats()">
                        🔄 重置统计
                    </button>
                </div>

                <div style="margin-top: 20px;">
                    <h3 style="color: #e94560; margin-bottom: 10px;">📈 检测历史</h3>
                    <div class="history-list" id="historyList">
                        <p style="color: #666; text-align: center;">暂无记录</p>
                    </div>
                </div>
            </div>
        </div>

        <footer>
            <p>安全帽检测系统 v1.0 | 基于 YOLOv8 深度学习框架</p>
            <p style="margin-top: 5px; font-size: 0.8em;">⚠️ 本系统仅供安全监控参考，实际安全决策请结合人工判断</p>
        </footer>
    </div>

    <script>
        // ============ 全局变量 ============
        let cameraActive = false;
        let statsInterval = null;

        // ============ 文件上传 ============
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const previewContainer = document.getElementById('previewContainer');
        const previewImage = document.getElementById('previewImage');
        const resultPanel = document.getElementById('resultPanel');
        const loader = document.getElementById('loader');

        uploadArea.addEventListener('click', () => fileInput.click());
        
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                handleFile(files[0]);
            }
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFile(e.target.files[0]);
            }
        });

        async function handleFile(file) {
            if (!file.type.startsWith('image/')) {
                showAlert('error', '请选择图片文件！');
                return;
            }

            loader.style.display = 'block';
            previewContainer.classList.remove('active');
            resultPanel.classList.remove('active');

            const formData = new FormData();
            formData.append('image', file);

            try {
                const response = await fetch('/api/detect/image', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (data.success) {
                    previewImage.src = data.image_base64;
                    previewContainer.classList.add('active');
                    
                    // 显示检测结果
                    displayResults(data.detections, data.summary);
                    showAlert('success', `检测完成！发现 ${data.summary.total_people} 个人，合规率 ${data.summary.compliance_rate}%`);
                    
                    updateStatsDisplay();
                } else {
                    showAlert('error', data.error || '检测失败');
                }
            } catch (err) {
                showAlert('error', '网络错误: ' + err.message);
            } finally {
                loader.style.display = 'none';
            }
        }

        function displayResults(detections, summary) {
            const list = document.getElementById('detectionList');
            list.innerHTML = '';

            // 显示汇总
            const summaryDiv = document.createElement('div');
            summaryDiv.style.cssText = 'margin-bottom: 15px; padding: 10px; background: rgba(0,0,0,0.2); border-radius: 8px;';
            summaryDiv.innerHTML = `
                <strong>总人数:</strong> ${summary.total_people} | 
                <strong style="color: #00d9ff;">已佩戴:</strong> ${summary.wearing_hardhat} | 
                <strong style="color: #ff4757;">未佩戴:</strong> ${summary.not_wearing_hardhat} | 
                <strong>合规率:</strong> ${summary.compliance_rate}%
            `;
            list.appendChild(summaryDiv);

            // 显示每个检测结果
            detections.forEach((det, index) => {
                const item = document.createElement('div');
                const isCompliant = det.class === 'Hardhat';
                item.className = `detection-item ${isCompliant ? 'compliant' : 'violation'}`;
                item.innerHTML = `
                    <span>#${index + 1} ${det.class}</span>
                    <span>置信度: ${(det.confidence * 100).toFixed(1)}%</span>
                `;
                list.appendChild(item);
            });

            resultPanel.classList.add('active');
        }

        // ============ 摄像头控制 ============
        function startCamera() {
            const feed = document.getElementById('cameraFeed');
            const placeholder = document.getElementById('cameraPlaceholder');
            
            feed.src = '/video_feed?' + new Date().getTime();
            feed.style.display = 'block';
            placeholder.style.display = 'none';
            
            document.getElementById('btnStartCamera').style.display = 'none';
            document.getElementById('btnStopCamera').style.display = 'inline-block';
            
            cameraActive = true;
            
            // 开始更新统计
            statsInterval = setInterval(updateStatsDisplay, 2000);
        }

        function stopCamera() {
            const feed = document.getElementById('cameraFeed');
            const placeholder = document.getElementById('cameraPlaceholder');
            
            feed.src = '';
            feed.style.display = 'none';
            placeholder.style.display = 'block';
            
            document.getElementById('btnStartCamera').style.display = 'inline-block';
            document.getElementById('btnStopCamera').style.display = 'none';
            
            cameraActive = false;
            
            if (statsInterval) {
                clearInterval(statsInterval);
            }
        }

        // ============ 统计更新 ============
        async function updateStatsDisplay() {
            try {
                const response = await fetch('/api/stats');
                const stats = await response.json();
                
                document.getElementById('stat-total').textContent = stats.total_detections;
                document.getElementById('stat-compliant').textContent = stats.compliant;
                document.getElementById('stat-violation').textContent = stats.violations;
                
                const total = stats.compliant + stats.violations;
                const rate = total > 0 ? ((stats.compliant / total) * 100).toFixed(1) : 0;
                document.getElementById('stat-rate').textContent = rate + '%';
                
                // 更新历史记录
                updateHistory(stats.history);
            } catch (e) {
                console.error('获取统计失败:', e);
            }
        }

        function updateHistory(history) {
            const list = document.getElementById('historyList');
            if (history.length === 0) return;
            
            list.innerHTML = '';
            history.slice().reverse().forEach(item => {
                const div = document.createElement('div');
                div.className = 'history-item';
                div.innerHTML = `
                    <span>${item.time}</span>
                    <span>
                        <span style="color: #00d9ff;">✓ ${item.compliant}</span> / 
                        <span style="color: #ff4757;">✗ ${item.violations}</span>
                    </span>
                `;
                list.appendChild(div);
            });
        }

        async function resetStats() {
            try {
                await fetch('/api/stats/reset', { method: 'POST' });
                updateStatsDisplay();
                showAlert('success', '统计已重置');
            } catch (e) {
                showAlert('error', '重置失败');
            }
        }

        // ============ 工具函数 ============
        function showAlert(type, message) {
            const successEl = document.getElementById('alertSuccess');
            const errorEl = document.getElementById('alertError');
            
            successEl.classList.remove('show');
            errorEl.classList.remove('show');
            
            if (type === 'success') {
                successEl.textContent = message;
                successEl.classList.add('show');
            } else {
                errorEl.textContent = message;
                errorEl.classList.add('show');
            }
            
            setTimeout(() => {
                successEl.classList.remove('show');
                errorEl.classList.remove('show');
            }, 5000);
        }

        // 初始加载统计
        updateStatsDisplay();
    </script>
</body>
</html>
