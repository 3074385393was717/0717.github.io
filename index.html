<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Safety System</title>
    <style>
        body { background-color: #1a1a2e; color: white; font-family: sans-serif; margin: 0; padding: 20px; }
        
        /* 语言切换栏 */
        .lang-selector { display: flex; gap: 10px; margin-bottom: 20px; justify-content: center; }
        .lang-selector button { padding: 5px 15px; border-radius: 15px; border: none; cursor: pointer; background: #4e4e6a; color: white; }
        
        /* 合并后的标题栏 */
        .nav-container { display: flex; justify-content: center; gap: 10px; padding: 20px; border-bottom: 1px solid #333; }
        .nav-btn { padding: 12px 25px; border-radius: 25px; border: none; background: #ff6b6b; color: white; font-weight: bold; cursor: pointer; }

        .content { margin-top: 20px; text-align: center; }
    </style>
</head>
<body>

    <div class="lang-selector">
        <button onclick="setLanguage('zh')">中文</button>
        <button onclick="setLanguage('en')">English</button>
        <button onclick="setLanguage('ko')">한국어</button>
    </div>

    <div class="nav-container">
        <button class="nav-btn" data-i18n="nav_title">图片检测 / 实时摄像头</button>
    </div>

    <div class="content">
        <h2 data-i18n="page_desc">系统运行中...</h2>
    </div>

    <script>
        const translations = {
            'zh': { 'nav_title': '图片检测 / 实时摄像头', 'page_desc': '基于 YOLOv8 的智能监控' },
            'en': { 'nav_title': 'Image Detection / Live Camera', 'page_desc': 'Smart Monitoring based on YOLOv8' },
            'ko': { 'nav_title': '이미지 감지 / 실시간 카메라', 'page_desc': 'YOLOv8 기반 스마트 모니터링' }
        };

        function setLanguage(lang) {
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                el.innerText = translations[lang][key];
            });
        }
    </script>
</body>
</html>
